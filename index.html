<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Heaven for woo 2026</title>
    <link rel="stylesheet" href="./style.css" />

    <!-- favicon 関連 -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <!-- fallback 用 -->
    <link rel="icon" href="images/favicon.ico" />

    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <main class="stage" aria-label="Dog and profile icon blue stream animation">
      <div class="background" aria-hidden="true">
        <div class="side-glow side-glow-left"></div>
        <div class="side-glow side-glow-right"></div>

        <div class="flow-layer flow-layer-deep">
          <span
            style="--top: 7%; --height: 17%; --delay: -1.5s; --duration: 18s"
          ></span>
          <span
            style="--top: 26%; --height: 19%; --delay: -8.2s; --duration: 20s"
          ></span>
          <span
            style="--top: 47%; --height: 18%; --delay: -12.4s; --duration: 22s"
          ></span>
          <span
            style="--top: 68%; --height: 17%; --delay: -5.6s; --duration: 19s"
          ></span>
        </div>

        <div class="flow-layer flow-layer-soft">
          <span
            style="--top: 13%; --height: 7%; --delay: -4.8s; --duration: 12s"
          ></span>
          <span
            style="--top: 35%; --height: 8%; --delay: -2.2s; --duration: 13.5s"
          ></span>
          <span
            style="--top: 57%; --height: 7%; --delay: -9.4s; --duration: 11.6s"
          ></span>
          <span
            style="--top: 80%; --height: 6%; --delay: -7.2s; --duration: 14.2s"
          ></span>
        </div>

        <div class="line-layer line-layer-main">
          <span
            style="--top: 10%; --delay: -1.2s; --duration: 7.8s; --width: 44vw"
          ></span>
          <span
            style="--top: 16%; --delay: -5.6s; --duration: 9.2s; --width: 34vw"
          ></span>
          <span
            style="--top: 24%; --delay: -3.4s; --duration: 8.6s; --width: 52vw"
          ></span>
          <span
            style="--top: 33%; --delay: -8.1s; --duration: 9.8s; --width: 30vw"
          ></span>
          <span
            style="--top: 43%; --delay: -4.9s; --duration: 8.4s; --width: 56vw"
          ></span>
          <span
            style="--top: 55%; --delay: -7.7s; --duration: 10.1s; --width: 38vw"
          ></span>
          <span
            style="--top: 67%; --delay: -2.8s; --duration: 9.1s; --width: 48vw"
          ></span>
          <span
            style="--top: 77%; --delay: -10.2s; --duration: 8.9s; --width: 42vw"
          ></span>
          <span
            style="--top: 86%; --delay: -6.4s; --duration: 9.6s; --width: 54vw"
          ></span>
        </div>

        <div class="line-layer line-layer-soft">
          <span
            style="--top: 7%; --delay: -2.4s; --duration: 13s; --width: 60vw"
          ></span>
          <span
            style="--top: 20%; --delay: -6.7s; --duration: 14.6s; --width: 46vw"
          ></span>
          <span
            style="--top: 29%; --delay: -9.1s; --duration: 12.2s; --width: 64vw"
          ></span>
          <span
            style="--top: 39%; --delay: -3.6s; --duration: 15.1s; --width: 50vw"
          ></span>
          <span
            style="--top: 51%; --delay: -8.8s; --duration: 14.4s; --width: 58vw"
          ></span>
          <span
            style="--top: 63%; --delay: -4.7s; --duration: 13.8s; --width: 44vw"
          ></span>
          <span
            style="
              --top: 72%;
              --delay: -11.1s;
              --duration: 16.2s;
              --width: 66vw;
            "
          ></span>
          <span
            style="--top: 83%; --delay: -5.4s; --duration: 14.9s; --width: 52vw"
          ></span>
        </div>

        <div class="glass-panels">
          <span class="panel panel-1"></span>
          <span class="panel panel-2"></span>
          <span class="panel panel-3"></span>
          <span class="panel panel-4"></span>
          <span class="panel panel-5"></span>
          <span class="panel panel-6"></span>
        </div>
      </div>

      <div class="runner" id="runner" aria-hidden="true">
        <div class="runner-pair dog-first" id="runnerPair">
          <svg
            class="symbol-icon dog-icon"
            viewBox="0 0 128 96"
            role="img"
            aria-hidden="true"
            focusable="false"
          >
            <path class="icon-fill" d="M29 50 L11 36 L7 45 L23 61 Z" />
            <path
              class="icon-fill"
              d="M21 59 L34 40 L72 40 L86 52 L86 73 L77 73 L72 86 L61 86 L58 73 L43 73 L39 86 L29 86 L26 73 L20 73 Z"
            />
            <path
              class="icon-fill"
              d="M76 42 L91 32 L109 41 L120 56 L112 72 L94 72 L84 62 Z"
            />
            <path class="icon-fill" d="M87 34 L82 15 L100 30 Z" />
            <path class="icon-cut" d="M96 45 H102 V51 H96 Z" />
            <path class="icon-cut" d="M111 53 L121 57 L112 62 Z" />
            <path
              class="icon-line"
              d="M29 50 L11 36 L7 45 L23 61 M21 59 L34 40 H72 L86 52 L91 32 L109 41 L120 56 L112 72 H94 L84 62 L86 73 H77 L72 86 H61 L58 73 H43 L39 86 H29 L26 73 H20 Z"
            />
          </svg>

          <svg
            class="symbol-icon profile-icon"
            viewBox="0 0 128 128"
            role="img"
            aria-hidden="true"
            focusable="false"
          >
            <ellipse class="icon-fill" cx="64" cy="10" rx="14" ry="4" />
            <circle class="icon-fill" cx="64" cy="27" r="12" />
            <path
              class="icon-fill"
              d="M56 42 L72 42 L80 60 L72 74 L56 74 L48 60 Z"
            />
            <path
              class="icon-fill"
              d="M46 46 C36 39 24 39 16 45 C22 57 33 63 47 61 Z"
            />
            <path
              class="icon-fill"
              d="M82 46 C92 39 104 39 112 45 C106 57 95 63 81 61 Z"
            />
            <path class="icon-fill" d="M50 52 L60 59 L47 73 L37 67 Z" />
            <path class="icon-fill" d="M78 52 L68 59 L81 73 L91 67 Z" />
            <path
              class="icon-fill"
              d="M58 74 L70 74 L79 108 L67 112 L61 90 L55 112 L43 108 Z"
            />
            <path
              class="icon-cut"
              d="M60 24 C64 22 68 22 72 24 C70 28 67 30 64 30 C61 30 58 28 56 24 C57 24 58 24 60 24 Z"
            />
            <path
              class="icon-line"
              d="M56 42 L72 42 L80 60 L72 74 L56 74 L48 60 Z M46 46 C36 39 24 39 16 45 C22 57 33 63 47 61 Z M82 46 C92 39 104 39 112 45 C106 57 95 63 81 61 Z M50 52 L60 59 L47 73 L37 67 Z M78 52 L68 59 L81 73 L91 67 Z M58 74 L70 74 L79 108 L67 112 L61 90 L55 112 L43 108 Z"
            />
          </svg>
        </div>
      </div>

      <div class="portrait-notice" aria-hidden="true">
        <div class="rotate-mark"></div>
        <p>横向きで表示！</p>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
