<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>M Blue Stream</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="stage" aria-label="M and dog blue stream animation">
      <div class="background" aria-hidden="true">
        <div class="side-glow side-glow-left"></div>
        <div class="side-glow side-glow-right"></div>

        <div class="flow-layer flow-layer-deep">
          <span
            style="--top: 7%; --height: 17%; --delay: -1.5s; --duration: 18s"
          ></span>
          <span
            style="--top: 26%; --height: 19%; --delay: -8.2s; --duration: 20s"
          ></span>
          <span
            style="--top: 47%; --height: 18%; --delay: -12.4s; --duration: 22s"
          ></span>
          <span
            style="--top: 68%; --height: 17%; --delay: -5.6s; --duration: 19s"
          ></span>
        </div>

        <div class="flow-layer flow-layer-soft">
          <span
            style="--top: 13%; --height: 7%; --delay: -4.8s; --duration: 12s"
          ></span>
          <span
            style="--top: 35%; --height: 8%; --delay: -2.2s; --duration: 13.5s"
          ></span>
          <span
            style="--top: 57%; --height: 7%; --delay: -9.4s; --duration: 11.6s"
          ></span>
          <span
            style="--top: 80%; --height: 6%; --delay: -7.2s; --duration: 14.2s"
          ></span>
        </div>

        <div class="line-layer line-layer-main">
          <span
            style="--top: 10%; --delay: -1.2s; --duration: 7.8s; --width: 44vw"
          ></span>
          <span
            style="--top: 16%; --delay: -5.6s; --duration: 9.2s; --width: 34vw"
          ></span>
          <span
            style="--top: 24%; --delay: -3.4s; --duration: 8.6s; --width: 52vw"
          ></span>
          <span
            style="--top: 33%; --delay: -8.1s; --duration: 9.8s; --width: 30vw"
          ></span>
          <span
            style="--top: 43%; --delay: -4.9s; --duration: 8.4s; --width: 56vw"
          ></span>
          <span
            style="--top: 55%; --delay: -7.7s; --duration: 10.1s; --width: 38vw"
          ></span>
          <span
            style="--top: 67%; --delay: -2.8s; --duration: 9.1s; --width: 48vw"
          ></span>
          <span
            style="--top: 77%; --delay: -10.2s; --duration: 8.9s; --width: 42vw"
          ></span>
          <span
            style="--top: 86%; --delay: -6.4s; --duration: 9.6s; --width: 54vw"
          ></span>
        </div>

        <div class="line-layer line-layer-soft">
          <span
            style="--top: 7%; --delay: -2.4s; --duration: 13s; --width: 60vw"
          ></span>
          <span
            style="--top: 20%; --delay: -6.7s; --duration: 14.6s; --width: 46vw"
          ></span>
          <span
            style="--top: 29%; --delay: -9.1s; --duration: 12.2s; --width: 64vw"
          ></span>
          <span
            style="--top: 39%; --delay: -3.6s; --duration: 15.1s; --width: 50vw"
          ></span>
          <span
            style="--top: 51%; --delay: -8.8s; --duration: 14.4s; --width: 58vw"
          ></span>
          <span
            style="--top: 63%; --delay: -4.7s; --duration: 13.8s; --width: 44vw"
          ></span>
          <span
            style="
              --top: 72%;
              --delay: -11.1s;
              --duration: 16.2s;
              --width: 66vw;
            "
          ></span>
          <span
            style="--top: 83%; --delay: -5.4s; --duration: 14.9s; --width: 52vw"
          ></span>
        </div>

        <div class="glass-panels">
          <span class="panel panel-1"></span>
          <span class="panel panel-2"></span>
          <span class="panel panel-3"></span>
          <span class="panel panel-4"></span>
          <span class="panel panel-5"></span>
          <span class="panel panel-6"></span>
        </div>
      </div>

      <div class="runner" id="runner" aria-hidden="true">
        <div class="runner-pair dog-first" id="runnerPair">
          <svg
            class="dog-icon"
            viewBox="0 0 128 96"
            role="img"
            aria-hidden="true"
            focusable="false"
          >
            <path class="dog-fill" d="M29 50 L11 36 L7 45 L23 61 Z" />
            <path
              class="dog-fill"
              d="M21 59 L34 40 L72 40 L86 52 L86 73 L77 73 L72 86 L61 86 L58 73 L43 73 L39 86 L29 86 L26 73 L20 73 Z"
            />
            <path
              class="dog-fill"
              d="M76 42 L91 32 L109 41 L120 56 L112 72 L94 72 L84 62 Z"
            />
            <path class="dog-fill" d="M87 34 L82 15 L100 30 Z" />
            <path class="dog-cut" d="M96 45 H102 V51 H96 Z" />
            <path class="dog-cut" d="M111 53 L121 57 L112 62 Z" />
            <path
              class="dog-line"
              d="M29 50 L11 36 L7 45 L23 61 M21 59 L34 40 H72 L86 52 L91 32 L109 41 L120 56 L112 72 H94 L84 62 L86 73 H77 L72 86 H61 L58 73 H43 L39 86 H29 L26 73 H20 Z"
            />
          </svg>

          <span class="initial-m">M</span>
        </div>
      </div>

      <div class="portrait-notice" aria-hidden="true">
        <div class="rotate-mark"></div>
        <p>横向きで表示！</p>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
